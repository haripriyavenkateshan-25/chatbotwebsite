<!DOCTYPE html>
<html>
<head>
    <title>RuleBot Chatbot</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background: linear-gradient(135deg,#667eea,#764ba2);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .chat-container{
            width:450px;
            background:white;
            border-radius:20px;
            box-shadow:0px 5px 25px rgba(0,0,0,0.3);
            overflow:hidden;
        }

        .header{
            background:#4a47a3;
            color:white;
            text-align:center;
            padding:20px;
            font-size:24px;
            font-weight:bold;
        }

        .chat-box{
            height:350px;
            padding:20px;
            overflow-y:auto;
            background:#f4f4f4;
        }

        .user{
            text-align:right;
            margin:10px;
        }

        .user span{
            background:#4a47a3;
            color:white;
            padding:10px 15px;
            border-radius:15px;
            display:inline-block;
        }

        .bot{
            text-align:left;
            margin:10px;
        }

        .bot span{
            background:#dddddd;
            padding:10px 15px;
            border-radius:15px;
            display:inline-block;
        }

        .input-area{
            display:flex;
            padding:15px;
            background:white;
        }

        input{
            flex:1;
            padding:12px;
            border:1px solid #ccc;
            border-radius:10px;
            outline:none;
        }

        button{
            margin-left:10px;
            padding:12px 20px;
            border:none;
            background:#4a47a3;
            color:white;
            border-radius:10px;
            cursor:pointer;
        }

        button:hover{
            background:#362f78;
        }
    </style>
</head>

<body>

<div class="chat-container">

    <div class="header">
        🤖 RuleBot Chatbot
    </div>

    <div class="chat-box">

        {% if user_message %}
        <div class="user">
            <span>{{ user_message }}</span>
        </div>
        {% endif %}

        {% if response %}
        <div class="bot">
            <span>{{ response }}</span>
        </div>
        {% endif %}

    </div>

    <form method="POST" class="input-area">

        <input
            type="text"
            name="message"
            placeholder="Type your message..."
            required>

        <button type="submit">
            Send
        </button>

    </form>

</div>

</body>
</html>
